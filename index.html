<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

<style>
:root{
  --bg:#f4eddf; --bg2:#ece2cf; --surface:#fffdf7; --surface2:#faf4e8;
  --ink:#22302d; --ink-soft:#5e6c66; --ink-faint:#94978c; --line:#e4d9c3;
  --primary:#1f5e57; --primary-d:#163f3a; --primary-soft:#e1efe9;
  --camp:#d2842a; --camp-d:#b06d1f; --camp-soft:#fbeed7;
  --fish:#2e85a4; --fish-d:#216a86; --fish-soft:#dcedf3;
  --star:#e6a82e; --danger:#c0563f; --danger-soft:#f7e2dc;
  --shadow:0 8px 24px rgba(40,40,30,.12); --shadow-s:0 2px 8px rgba(40,40,30,.08);
  --radius:18px; --radius-s:12px;
  --nav-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Gowun Dodum',-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  line-height:1.5; overscroll-behavior-y:none;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
h1,h2,h3,.serif,.brand{font-family:'Gowun Batang',serif}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:16px}
.hidden{display:none !important}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(135deg,var(--primary-d),var(--primary) 60%,#2c7d76);
  color:#fdf7ea; padding:calc(env(safe-area-inset-top) + 16px) 20px 14px;
  box-shadow:0 4px 14px rgba(22,63,58,.28);
}
header .brand{font-size:22px; font-weight:700; letter-spacing:.5px; display:flex; align-items:center; gap:9px}
header .brand .logo{width:30px;height:30px;border-radius:7px;display:block;box-shadow:0 2px 6px rgba(0,0,0,.25)}
header .sub{font-size:12.5px; opacity:.82; margin-top:2px; letter-spacing:.3px}
.stats{display:flex; gap:8px; margin-top:13px}
.stat{flex:1; background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.18); border-radius:12px; padding:8px 10px; backdrop-filter:blur(4px)}
.stat .n{font-family:'Gowun Batang',serif; font-size:20px; font-weight:700; line-height:1}
.stat .l{font-size:11px; opacity:.8; margin-top:3px}

/* ---------- Tabs / panels ---------- */
.panel{display:none; padding:16px 16px 24px; animation:fade .3s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Filter chips ---------- */
.chips{display:flex; gap:8px; margin-bottom:14px}
.chip{padding:7px 15px; border-radius:999px; font-size:13.5px; background:var(--surface); border:1.5px solid var(--line); color:var(--ink-soft); transition:.15s}
.chip.active{background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:var(--shadow-s)}
.chip.camp.active{background:var(--camp); border-color:var(--camp)}
.chip.fish.active{background:var(--fish); border-color:var(--fish)}

/* ---------- List cards ---------- */
.list{display:flex; flex-direction:column; gap:12px}
.card{
  background:var(--surface); border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow-s); display:flex; border:1px solid var(--line);
  transition:transform .12s; position:relative;
}
.card:active{transform:scale(.985)}
.card .thumb{width:104px; min-width:104px; background:var(--bg2); object-fit:cover; align-self:stretch}
.card .thumb.empty{display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.5}
.card .body{padding:12px 13px; flex:1; min-width:0}
.card .top{display:flex; align-items:center; gap:7px; margin-bottom:3px}
.badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.3px; white-space:nowrap}
.badge.camp{background:var(--camp-soft); color:var(--camp-d)}
.badge.fish{background:var(--fish-soft); color:var(--fish-d)}
.card .date{font-size:12px; color:var(--ink-faint); margin-left:auto}
.card .title{font-family:'Gowun Batang',serif; font-size:16.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.card .place{font-size:12.5px; color:var(--ink-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.card .meta{display:flex; gap:10px; flex-wrap:wrap; margin-top:7px; font-size:12px; color:var(--ink-soft)}
.card .meta span{display:inline-flex; align-items:center; gap:3px}
.stars{color:var(--star); font-size:13px; letter-spacing:1px}
.stars .off{color:#dfd6c4}
.syncing{position:absolute; top:8px; right:8px; font-size:10px; background:rgba(31,94,87,.9); color:#fff; padding:2px 7px; border-radius:999px}

.empty-state{text-align:center; padding:54px 20px; color:var(--ink-faint)}
.empty-state .ico{font-size:46px; margin-bottom:10px}
.empty-state .t{font-family:'Gowun Batang',serif; font-size:17px; color:var(--ink-soft)}

/* ---------- FAB ---------- */
.fab{
  position:fixed; right:18px; bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
  width:58px; height:58px; border-radius:50%; z-index:60;
  background:linear-gradient(145deg,#2c7d76,var(--primary-d));
  color:#fff; font-size:30px; line-height:58px; text-align:center;
  box-shadow:0 8px 22px rgba(22,63,58,.42); transition:transform .15s;
}
.fab:active{transform:scale(.92)}

/* ---------- Bottom nav ---------- */
nav{
  position:fixed; left:0; right:0; bottom:0; z-index:70;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--surface); border-top:1px solid var(--line);
  display:flex; box-shadow:0 -3px 14px rgba(40,40,30,.06);
}
nav button{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--ink-faint); font-size:11px; transition:.15s}
nav button svg{width:23px; height:23px; stroke-width:1.9}
nav button.active{color:var(--primary)}

/* ---------- Map ---------- */
#map{height:calc(100vh - 124px - var(--nav-h) - env(safe-area-inset-top) - env(safe-area-inset-bottom)); min-height:340px; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-s); border:1px solid var(--line)}
.pin{display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); box-shadow:0 3px 7px rgba(0,0,0,.3); border:2px solid #fff}
.pin span{transform:rotate(45deg); font-size:16px}
.pin.camp{background:var(--camp)} .pin.fish{background:var(--fish)}
.leaflet-popup-content{margin:10px 12px; font-family:'Gowun Dodum',sans-serif}
.popup img{width:100%; height:96px; object-fit:cover; border-radius:9px; margin-bottom:7px}
.popup .pt{font-family:'Gowun Batang',serif; font-weight:700; font-size:15px}
.popup .pd{font-size:12px; color:var(--ink-soft); margin:2px 0 8px}
.popup button{background:var(--primary); color:#fff; width:100%; padding:7px; border-radius:8px; font-size:13px}

/* ---------- Calendar ---------- */
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
.cal-head h2{font-size:19px; margin:0}
.cal-head button{width:38px; height:38px; border-radius:11px; background:var(--surface); border:1px solid var(--line); font-size:18px; color:var(--primary); box-shadow:var(--shadow-s)}
.dow{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:5px}
.dow div{text-align:center; font-size:11.5px; color:var(--ink-faint); padding:4px 0}
.dow div:first-child{color:#cf6a52} .dow div:last-child{color:#3f7fb0}
.grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px}
.cell{aspect-ratio:1/1.12; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:5px 4px 4px; position:relative; overflow:hidden; transition:.12s}
.cell.empty{background:transparent; border:none}
.cell.has:active{transform:scale(.95)}
.cell .dn{font-size:12px; color:var(--ink-soft)}
.cell.today{border-color:var(--primary); border-width:2px}
.cell.today .dn{color:var(--primary); font-weight:700}
.cell .dots{position:absolute; bottom:5px; left:0; right:0; display:flex; gap:3px; justify-content:center}
.cell .dot{width:7px; height:7px; border-radius:50%}
.cell .dot.camp{background:var(--camp)} .cell .dot.fish{background:var(--fish)}
.cell .thumbbg{position:absolute; inset:0; background-size:cover; background-position:center; opacity:.32}
.cell .cnt{position:absolute; top:4px; right:5px; font-size:10px; font-weight:700; color:var(--primary)}
.cal-legend{display:flex; gap:16px; justify-content:center; margin-top:14px; font-size:12px; color:var(--ink-soft)}
.cal-legend span{display:inline-flex; align-items:center; gap:5px}
.cal-legend i{width:9px; height:9px; border-radius:50%; display:inline-block}

/* ---------- Modal / Sheet ---------- */

.overlay.open{display:flex; animation:fade .2s}
.sheet{
  background:var(--bg); width:100%; max-width:560px; max-height:94vh; overflow-y:auto;
  border-radius:22px 22px 0 0; box-shadow:var(--shadow); animation:slideup .28s cubic-bezier(.2,.8,.25,1);
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet-head{position:sticky; top:0; background:var(--bg); padding:16px 18px 12px; display:flex; align-items:center; gap:10px; z-index:5; border-bottom:1px solid var(--line)}
.sheet-head h2{font-size:18px; margin:0; flex:1}
.sheet-head .x{width:34px; height:34px; border-radius:10px; font-size:20px; color:var(--ink-soft); background:var(--surface2)}
.grab{width:42px; height:5px; border-radius:3px; background:var(--line); margin:8px auto 0}
.sheet-body{padding:16px 18px}

.typetoggle button .ti{font-size:24px}
.typetoggle button.on.camp{border-color:var(--camp); background:var(--camp-soft); color:var(--camp-d)}
.typetoggle button.on.fish{border-color:var(--fish); background:var(--fish-soft); color:var(--fish-d)}
.field{margin-bottom:15px}

  DRIVE_FOLDER_ID: '1g0lWU2K9P6eXA0Gkk7Yr-EbpSrsZpaDv',
  // ↓↓↓ Apps Script 웹앱 배포 후 받은 /exec URL 을 붙여넣으세요 ↓↓↓
  GAS_URL: 'https://script.google.com/macros/s/AKfycbx47nt8u5kx4ktAG3K6kcyDd8kdF0tK-7XviI2wOvR7hHoFBgxTkO9LOsv-ZwA9Z0r3Nw/exec',
  // (선택) '웹에 게시'한 CSV URL 을 넣으면 가장 안정적으로 읽힙니다. 비워두면 gviz 방식 사용.
  CSV_URL_OVERRIDE: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vScWoC2ZqpjSFYu0WcJ3lu116q_WhWCpaO6-xy_Q7pj5lTQs-6gw-M9biusvtgKQplXRrmWcaCUKhNb/pub?output=csv'
};
const READ_URL = CONFIG.CSV_URL_OVERRIDE ||
  `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
const CACHE_KEY   = 'fieldlog_cache_v1';   // 시트에서 읽어온 확정 기록
const PENDING_KEY = 'fieldlog_pending_v1'; // 저장/수정 대기 (시트 확인 전까지 유지)
const TOMB_KEY    = 'fieldlog_tomb_v1';    // 삭제 표시 (스테일 CSV가 되살리지 못하게)
const OVERLAY_TTL = 8*60*1000;             // 수정 오버레이 유지 시간 (게시 CSV 캐시 대비)
const COLS = ['id','type','date','title','lat','lng','place','rating','memo','photo','weather','companions','price','campType','stay','revisit','startTime','endTime','species','fishCount','toilet','tide','bait','createdAt'];

/* ============================================================ state */
const state = { records: [], remote: [], pending: [], tomb: [], listFilter:'all', mapFilter:'all', calDate:new Date(),
  form:{ type:'camping', rating:0, weather:'', campType:'', revisit:'', tide:'', photos:[], existing:[], editId:null, lat:null, lng:null } };
let map, pickMap, pickMarker, markers=[];

/* localStorage helpers */
function readLS(k,def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
function writeLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); return true; }catch(e){ return false; } }

/* ============================================================ utils */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function starHTML(n){ n=parseInt(n)||0; let h=''; for(let i=1;i<=5;i++) h+=`<span class="${i<=n?'':'off'}">★</span>`; return `<span class="stars">${h}</span>`; }
function fmtDate(d){ if(!d) return ''; const p=String(d).split('-'); return p.length===3?`${p[0]}.${p[1]}.${p[2]}`:d; }
function photosOf(r){ return (r.photos && r.photos.length) ? r.photos : (r.photo? String(r.photo).split(',').map(s=>s.trim()).filter(Boolean):[]); }

/* CSV parser (handles quotes, commas, newlines) */
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===',') {row.push(cur);cur='';}
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){} else cur+=c; } }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}

/* ============================================================ data load + sync */

/* 확정 기록(remote) + 대기열(pending) + 삭제표시(tomb) 를 합쳐 화면용 records 생성 */
function mergeRecords(){
  const tombIds = new Set(state.tomb.map(t=>t.id));
  const byId = new Map();
  state.remote.forEach(r=>{ if(!tombIds.has(r.id)) byId.set(r.id, {...r}); });
  state.pending.forEach(p=>{
    if(tombIds.has(p.rec.id)) return;
    byId.set(p.rec.id, {...p.rec, _syncing: !p.sent});  // 서버 전송 완료(sent)면 배지 제거
  });
  const arr=[...byId.values()];
  arr.forEach(r=>{ if(!r.photos) r.photos=photosOf(r); });
  arr.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.createdAt||'').localeCompare(a.createdAt||''));
  state.records = arr;
}

/* 시트(remote)와 비교해 확인된 대기열/삭제표시 정리 */
function reconcile(){
  const remoteIds = new Set(state.remote.map(r=>r.id));
  const now = Date.now();
  state.pending = state.pending.filter(p=>{
    if(p.action==='add')    return !remoteIds.has(p.rec.id);          // 시트에 나타나면 확정 → 제거
    if(p.action==='update') return (now - p.ts) < OVERLAY_TTL;        // 캐시 반영 시간 동안 유지
    return false;
  });
  state.tomb = state.tomb.filter(t=> remoteIds.has(t.id));            // 시트에서 사라지면 삭제 확정 → 제거
  writeLS(PENDING_KEY, state.pending); writeLS(TOMB_KEY, state.tomb);
}

/* 보내지 않은 대기열/삭제 재전송 (오프라인 → 재접속 시 자동 동기화) */
async function flushQueue(){
  if(!CONFIG.GAS_URL) return;
  for(const p of state.pending){
    if(p.sent) continue;
    try{
      const photos = (p.rec.photos||[]).filter(u=>String(u).startsWith('data:'));
      const existing = (p.rec.photos||[]).filter(u=>!String(u).startsWith('data:'));
      const rec = {...p.rec}; delete rec.photos; delete rec._syncing;
      await fetch(CONFIG.GAS_URL,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ action:p.action, id:p.rec.id, record:rec, existingPhotos:existing, photos:photos,
          folderId:CONFIG.DRIVE_FOLDER_ID, sheetName:CONFIG.SHEET_NAME }) });
      p.sent = true;
    }catch(e){ /* 아직 오프라인 — 다음 기회에 재전송 */ }
  }
  for(const t of state.tomb){
    if(t.sent) continue;
    try{ await fetch(CONFIG.GAS_URL,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action:'delete', id:t.id}) }); t.sent=true; }catch(e){}
  }
  writeLS(PENDING_KEY, state.pending); writeLS(TOMB_KEY, state.tomb);
}

async function loadData(){
  // 1) 로컬 저장본 먼저 표시 (즉시)
  state.remote  = readLS(CACHE_KEY, []);
  state.pending = readLS(PENDING_KEY, []);
  state.tomb    = readLS(TOMB_KEY, []);
  mergeRecords(); renderAll();

  if(!CONFIG.GAS_URL){ $('#cfgBanner').classList.remove('hidden'); $('#cfgBanner').innerHTML='<b>설정 필요:</b> Apps Script 웹앱을 배포하고 <b>index.html</b>의 <b>GAS_URL</b>에 붙여넣으면 저장이 활성화됩니다.'; }

  // 2) 못 보낸 대기열 재전송 (오프라인 복귀 대비)
  flushQueue();

  // 3) 시트에서 최신 읽기 → 확정 기록 갱신
  try{
    const bust = (CONFIG.CSV_URL_OVERRIDE? '&' : '&') + '_=' + Date.now();
    const res = await fetch(READ_URL + bust, {redirect:'follow', cache:'no-store'});
    const txt = await res.text();
    if(txt.trim().startsWith('<')) throw new Error('HTML returned (시트 공유/게시 필요)');
    const rows = parseCSV(txt).filter(r=>r.length>1 && r.some(c=>c!==''));
    const head = rows.length? rows.shift().map(h=>h.trim()) : [];
    const recs = rows.map(r=>{ const o={}; head.forEach((h,i)=>o[h]=(r[i]||'').trim()); o.photos=photosOf(o); return o; })
                     .filter(o=>o.id);
    state.remote = recs;
    writeLS(CACHE_KEY, recs);
    reconcile();
    mergeRecords(); renderAll();
  }catch(err){
    console.warn('read failed', err);
    mergeRecords(); renderAll();
    if(!state.records.length) toast('데이터를 불러오지 못했습니다 · 시트 공유/게시 확인');
  }
}

function renderList(){

/* ---- Map ---- */
function pinIcon(type){ return L.divIcon({ className:'', html:`<div class="pin ${type}"><span>${type==='camping'?'⛺':'🎣'}</span></div>`, iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-32] }); }
function renderMap(){
  if(!map) return;
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const f=state.mapFilter;
  const pts = state.records.filter(r=> (f==='all'||r.type===f) && r.lat && r.lng && !isNaN(+r.lat) && !isNaN(+r.lng));
  pts.forEach(r=>{
    const m=L.marker([+r.lat,+r.lng],{icon:pinIcon(r.type)}).addTo(map);
    const ph=photosOf(r)[0];
    m.bindPopup(`<div class="popup">${ph?`<img src="${esc(ph)}">`:''}<div class="pt">${esc(r.title)||'(제목 없음)'}</div><div class="pd">${r.type==='camping'?'⛺ 캠핑':'🎣 낚시'} · ${fmtDate(r.date)}</div><button onclick="openDetail('${r.id}')">자세히 보기</button></div>`);
    markers.push(m);
  });
  if(pts.length){ const g=L.featureGroup(markers); try{ map.fitBounds(g.getBounds().pad(0.3),{maxZoom:13}); }catch(e){} }
}

/* ---- Calendar ---- */
function renderCalendar(){
  const d=state.calDate, y=d.getFullYear(), mo=d.getMonth();
  $('#calTitle').textContent = `${y}.${String(mo+1).padStart(2,'0')}`;
  const first=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate();
  const today=new Date(); const todStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const byDate={};
  state.records.forEach(r=>{ if(!r.date) return; (byDate[r.date]=byDate[r.date]||[]).push(r); });
  let html='';
  for(let i=0;i<first;i++) html+='<div class="cell empty"></div>';
  for(let dn=1;dn<=days;dn++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
    const recs=byDate[ds]||[]; const has=recs.length>0;
    const ph = has? photosOf(recs[0])[0] : '';
    const types=[...new Set(recs.map(r=>r.type))];
    html+=`<div class="cell ${has?'has':''} ${ds===todStr?'today':''}" data-d="${ds}">
      ${ph?`<div class="thumbbg" style="background-image:url('${esc(ph)}')"></div>`:''}
      <div class="dn">${dn}</div>
      ${recs.length>1?`<div class="cnt">${recs.length}</div>`:''}
      ${has?`<div class="dots">${types.map(t=>`<span class="dot ${t}"></span>`).join('')}</div>`:''}
    </div>`;
  }
  $('#calGrid').innerHTML=html;
  $$('#calGrid .cell.has').forEach(c=>c.onclick=()=>{ const recs=byDate[c.dataset.d]; if(recs.length===1) openDetail(recs[0].id); else openDayList(c.dataset.d, recs); });
}
function openDayList(ds, recs){
  $('#detailBody').innerHTML = `<div class="dtitle">${fmtDate(ds)}</div><div class="dsub">${recs.length}개의 기록</div>`+
    recs.map(r=>{ const ph=photosOf(r)[0];
      return `<div class="card" data-id="${r.id}" style="margin-bottom:10px">${ph?`<img class="thumb" src="${esc(ph)}">`:`<div class="thumb empty">${r.type==='camping'?'⛺':'🎣'}</div>`}<div class="body"><div class="top"><span class="badge ${r.type}">${r.type==='camping'?'⛺ 캠핑':'🎣 낚시'}</span></div><div class="title">${esc(r.title)||'(제목 없음)'}</div><div class="meta">${starHTML(r.rating)}</div></div></div>`;
    }).join('');
  $$('#detailBody .card').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
  $('#detailOverlay').classList.add('open');

/* ============================================================ detail */
function openDetail(id){
  const r = state.records.find(x=>x.id===id); if(!r) return;
  const phs = photosOf(r);
  const isCamp=r.type==='camping';
  const rows=[];
  const add=(k,v)=>{ if(v!==undefined&&v!==null&&v!=='') rows.push(`<div class="drow"><div class="k">${k}</div><div class="v">${v}</div></div>`); };
  add('평가', starHTML(r.rating));
  add('위치', r.place?esc(r.place):'');
  add('날씨', r.weather?esc(r.weather):'');
  add('동행', r.companions?esc(r.companions):'');
  if(isCamp){
    add('비용', r.price?Number(r.price).toLocaleString()+'원':'');
    add('숙박', r.stay); add('유형', r.campType);
    add('재방문', r.revisit==='Y'?'👍 또 가고 싶다':r.revisit==='N'?'👎 글쎄':'');
  }else{
    add('낚시 시간', (r.startTime&&r.endTime)?`${r.startTime} ~ ${r.endTime}`:'');
    add('어종', r.species?esc(r.species):''); add('마릿수', r.fishCount?r.fishCount+'마리':'');
    add('화장실', r.toilet==='Y'?'있음':r.toilet==='N'?'없음':''); add('물때', r.tide);
    add('미끼/채비', r.bait?esc(r.bait):'');
  }
  add('메모', r.memo?esc(r.memo).replace(/\n/g,'<br>'):'');
  $('#detailBody').innerHTML = `
    ${phs.length?`<div class="detail-photos ${phs.length===1?'single':''}">${phs.map(p=>`<img src="${esc(p)}" onclick="openLightbox('${esc(p)}')">`).join('')}</div>`:''}
    <span class="badge ${r.type}">${isCamp?'⛺ 캠핑':'🎣 낚시'}</span>
    <div class="dtitle" style="margin-top:8px">${esc(r.title)||'(제목 없음)'}</div>
    <div class="dsub">📅 ${fmtDate(r.date)}${r.lat&&r.lng?` · <a href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}" target="_blank" style="color:var(--primary)">지도에서 열기 ↗</a>`:''}</div>
    ${rows.join('')}
    <div class="detail-actions">
      <button class="btn-edit" onclick="editRecord('${r.id}')">✏️ 수정</button>
      <button class="btn-del" onclick="deleteRecord('${r.id}')">🗑️ 삭제</button>
    </div>`;
  $('#detailOverlay').classList.add('open');
}

/* photos */
function renderPhotoGrid(){
  const grid=$('#photoGrid');
  grid.querySelectorAll('.photo-wrap').forEach(e=>e.remove());
  const all=[...state.form.existing.map(u=>({u,kind:'ex'})), ...state.form.photos.map(u=>({u,kind:'new'}))];
  all.forEach((p,idx)=>{
    const w=document.createElement('div'); w.className='photo-wrap';
    w.innerHTML=`<img class="photo-thumb" src="${p.u}"><div class="rm">✕</div>`;
    w.querySelector('.rm').onclick=()=>{ if(p.kind==='ex') state.form.existing=state.form.existing.filter(x=>x!==p.u); else state.form.photos=state.form.photos.filter(x=>x!==p.u); renderPhotoGrid(); };
    grid.insertBefore(w, grid.firstChild);
  });
}
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image(), reader=new FileReader();
    reader.onload=()=>img.src=reader.result; reader.onerror=reject;
    img.onload=()=>{ let{width:w,height:h}=img, M=1280;
      if(w>h&&w>M){h=Math.round(h*M/w);w=M;} else if(h>=w&&h>M){w=Math.round(w*M/h);h=M;}
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.82)); };
    img.onerror=reject; reader.readAsDataURL(file);
  });
}
$('#photoInput').onchange=async e=>{
  const files=[...e.target.files]; e.target.value='';
  for(const f of files){ if(state.form.existing.length+state.form.photos.length>=6){ toast('사진은 최대 6장'); break; } try{ state.form.photos.push(await compressImage(f)); }catch(err){} }
  renderPhotoGrid();
};

/* location pick map */
function initPickMap(){
  const c=state.form.lat? [state.form.lat,state.form.lng] : [37.5665,126.9780];
  if(!pickMap){
    pickMap=L.map('pickmap',{zoomControl:true,attributionControl:false}).setView(c, state.form.lat?13:11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(pickMap);
    pickMap.on('click', e=> setPick(e.latlng.lat, e.latlng.lng, true));
  } else { pickMap.setView(c, state.form.lat?13:11); setTimeout(()=>pickMap.invalidateSize(),100); }
  if(state.form.lat) setPick(state.form.lat, state.form.lng, false); else if(pickMarker){pickMap.removeLayer(pickMarker);pickMarker=null;}
  setTimeout(()=>pickMap.invalidateSize(),200);
}
function setPick(lat,lng,reverse){
  state.form.lat=+lat.toFixed(6); state.form.lng=+lng.toFixed(6);
  if(!pickMarker){ pickMarker=L.marker([lat,lng],{draggable:true,icon:pinIcon(state.form.type)}).addTo(pickMap);
    pickMarker.on('dragend',()=>{ const p=pickMarker.getLatLng(); setPick(p.lat,p.lng,true); }); }
  else pickMarker.setLatLng([lat,lng]);
  if(reverse) reverseGeocode(lat,lng);
}
async function reverseGeocode(lat,lng){
  try{ const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ko&zoom=16`);
    const j=await r.json(); if(j && j.display_name && !$('#fPlace').value.trim()){ const a=j.address||{};
      const parts=[a.city||a.county||a.province, a.borough||a.suburb||a.town||a.village, a.neighbourhood||a.road].filter(Boolean);
      $('#fPlace').value = parts.length? parts.join(' ') : j.display_name.split(',').slice(0,3).join(' ').trim(); }
  }catch(e){}
}
$('#gpsBtn').onclick=()=>{
  if(!navigator.geolocation){ toast('위치를 지원하지 않는 기기'); return; }
  $('#gpsBtn').innerHTML='<span class="spinner"></span> 가져오는 중…';
  navigator.geolocation.getCurrentPosition(p=>{ const{latitude,longitude}=p.coords; if(!pickMap) initPickMap(); pickMap.setView([latitude,longitude],15); setPick(latitude,longitude,true); $('#gpsBtn').textContent='📍 현재 위치'; toast('현재 위치를 가져왔습니다'); },
    err=>{ $('#gpsBtn').textContent='📍 현재 위치'; toast('위치 권한을 확인해주세요'); }, {enableHighAccuracy:true,timeout:10000});
};

/* location search (Nominatim) */
async function doLocSearch(){
  const q=$('#locSearch').value.trim(); if(!q){ $('#locSearch').focus(); return; }
  const box=$('#locResults'); box.classList.add('show');
  box.innerHTML='<div class="loc-loading"><span class="spinner" style="border-top-color:var(--primary)"></span> 검색 중…</div>';
  try{
    const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&accept-language=ko&limit=6&addressdetails=1`;
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    const list=await r.json();
    if(!Array.isArray(list)||!list.length){ box.innerHTML='<div class="loc-empty">검색 결과가 없습니다. 다른 키워드로 시도해보세요.</div>'; return; }
    box.innerHTML=list.map((it,i)=>{ const full=it.display_name||''; const short=full.split(',').slice(0,3).join(', ');
      return `<button type="button" class="loc-result" data-i="${i}"><div class="lr-name">${esc(short)}</div><div class="lr-full">${esc(full)}</div></button>`; }).join('');
    box.querySelectorAll('.loc-result').forEach(b=>b.onclick=()=>{
      const it=list[+b.dataset.i], lat=+it.lat, lng=+it.lon;
      if(!pickMap) initPickMap();
      pickMap.setView([lat,lng],15); setPick(lat,lng,false);
      $('#fPlace').value=(it.display_name||'').split(',').slice(0,3).join(' ').trim();
      box.classList.remove('show'); box.innerHTML=''; $('#locSearch').value='';
      setTimeout(()=>pickMap.invalidateSize(),150);
    });
  }catch(e){ box.innerHTML='<div class="loc-empty">검색 실패 · 네트워크를 확인해주세요.</div>'; }
}
$('#locSearchBtn').onclick=doLocSearch;
$('#locSearch').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doLocSearch(); } });

/* collect + submit */
function collectRecord(){
  const t=state.form.type;
  const rec={ id: state.form.editId||uid(), type:t,
    date:$('#fDate').value, title:$('#fTitle').value.trim(),
    lat:state.form.lat??'', lng:state.form.lng??'', place:$('#fPlace').value.trim(),
    rating:state.form.rating||'', memo:$('#fMemo').value.trim(),
    weather:state.form.weather, companions:$('#fComp').value.trim(),
    price:'',campType:'',stay:'',revisit:'',startTime:'',endTime:'',species:'',fishCount:'',toilet:'',tide:'',bait:'',
    createdAt: new Date().toISOString() };
  if(t==='camping'){ rec.price=$('#fPrice').value.trim(); rec.campType=state.form.campType; rec.stay=$('#fStay').value; rec.revisit=state.form.revisit; }
  else { rec.startTime=$('#fStart').value; rec.endTime=$('#fEnd').value; rec.species=$('#fSpecies').value.trim();
    rec.fishCount=$('#fCount').value.trim(); rec.toilet=$('#fToilet').value; rec.tide=state.form.tide; rec.bait=$('#fBait').value.trim(); }
  return rec;
}
$('#submitBtn').onclick=async()=>{
  const rec=collectRecord();
  if(!rec.title){ toast('제목을 입력해주세요'); return; }
  if(!rec.date){ toast('방문일을 선택해주세요'); return; }
  const btn=$('#submitBtn'); btn.disabled=true; const isEdit=!!state.form.editId;
  btn.innerHTML='<span class="spinner"></span> 저장 중…';

  // 표시용 사진: 기존 원격 URL + 새 로컬 사진(data url)
  const photos=[...state.form.existing, ...state.form.photos];
  const entry={ rec:{...rec, photos}, action:isEdit?'update':'add', ts:Date.now(), sent:false };

  // 대기열에 영구 보존 (시트 확인 전까지 사라지지 않음)
  state.pending = state.pending.filter(p=>p.rec.id!==rec.id);
  state.pending.push(entry);
  if(!writeLS(PENDING_KEY, state.pending)){
    // 용량 초과 시: 로컬 사진 데이터를 제외하고 다시 저장 (기록 자체는 보존)
    const slim = state.pending.map(p=>({...p, rec:{...p.rec, photos:(p.rec.photos||[]).filter(u=>!String(u).startsWith('data:'))}}));
    writeLS(PENDING_KEY, slim);
  }
  mergeRecords(); renderAll(); closeForm();
  btn.disabled=false; btn.textContent='기록 저장';

  if(!CONFIG.GAS_URL){ toast('GAS_URL 미설정 · 화면에만 표시됩니다'); return; }
  await flushQueue();
  mergeRecords(); renderAll();   // 전송 결과(sent) 반영 → 배지 즉시 갱신
  toast(entry.sent ? (isEdit?'수정되었습니다':'기록이 저장되었습니다') : '오프라인 · 연결되면 자동 저장됩니다');
  setTimeout(loadData, 4000);
  setTimeout(loadData, 20000);
};

function editRecord(id){
  const r=state.records.find(x=>x.id===id); if(!r) return;
  $('#detailOverlay').classList.remove('open');
  resetForm();
  state.form.editId=r.id; $('#formTitle').textContent='기록 수정';
  setType(r.type);
  $('#fTitle').value=r.title||''; $('#fDate').value=r.date||''; $('#fPlace').value=r.place||'';
  $('#fComp').value=r.companions||''; $('#fMemo').value=r.memo||'';
  setStars(parseInt(r.rating)||0);
  if(r.weather){ state.form.weather=r.weather; $$('#fWeather .qchip').forEach(b=>b.classList.toggle('on',b.dataset.v===r.weather)); }
  if(r.lat&&r.lng){ state.form.lat=+r.lat; state.form.lng=+r.lng; }
  if(r.type==='camping'){ $('#fPrice').value=r.price||''; $('#fStay').value=r.stay||'';
    if(r.campType){state.form.campType=r.campType; $$('#fCampType .qchip').forEach(b=>b.classList.toggle('on',b.dataset.v===r.campType));}
    if(r.revisit){state.form.revisit=r.revisit; $$('#fRevisit .qchip').forEach(b=>b.classList.toggle('on',b.dataset.v===r.revisit));}
  } else { $('#fStart').value=r.startTime||''; $('#fEnd').value=r.endTime||''; $('#fSpecies').value=r.species||'';
    $('#fCount').value=r.fishCount||''; $('#fToilet').value=r.toilet||'';
    if(r.tide){state.form.tide=r.tide; $$('#fTide .qchip').forEach(b=>b.classList.toggle('on',b.dataset.v===r.tide));}
    $('#fBait').value=r.bait||''; }
  state.form.existing=photosOf(r); state.form.photos=[];
  renderPhotoGrid();
  $('#formOverlay').classList.add('open'); setTimeout(initPickMap,250);
}
async function deleteRecord(id){
  if(!confirm('이 기록을 삭제할까요? 되돌릴 수 없습니다.')) return;
  // 대기 중이던 추가/수정이면 큐에서 제거
  state.pending = state.pending.filter(p=>p.rec.id!==id);
  // 삭제 표시 추가 (스테일 CSV가 되살리지 못하게)
  if(!state.tomb.some(t=>t.id===id)) state.tomb.push({id, ts:Date.now(), sent:false});
  writeLS(PENDING_KEY, state.pending); writeLS(TOMB_KEY, state.tomb);
  mergeRecords(); renderAll(); $('#detailOverlay').classList.remove('open');
  if(CONFIG.GAS_URL){ await flushQueue(); toast('삭제되었습니다'); setTimeout(loadData, 4000); }
  else toast('삭제됨 (화면)');
}

/* ============================================================ nav & events */
function switchTab(tab){
  $$('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  $$('.panel').forEach(p=>p.classList.toggle('active', p.id==='tab-'+tab));
  if(tab==='map'){ if(!map){ map=L.map('map',{zoomControl:true}).setView([36.5,127.8],7); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map); } setTimeout(()=>{map.invalidateSize(); renderMap();},150); }
}
$$('nav button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
$$('#listFilter .chip').forEach(c=>c.onclick=()=>{ $$('#listFilter .chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); state.listFilter=c.dataset.f; renderList(); });
$$('#mapFilter .chip').forEach(c=>c.onclick=()=>{ $$('#mapFilter .chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); state.mapFilter=c.dataset.f; renderMap(); });
$('#calPrev').onclick=()=>{ state.calDate.setMonth(state.calDate.getMonth()-1); renderCalendar(); };
$('#calNext').onclick=()=>{ state.calDate.setMonth(state.calDate.getMonth()+1); renderCalendar(); };
$('#fab').onclick=openForm;
$('#formClose').onclick=closeForm;
$('#detailClose').onclick=()=>$('#detailOverlay').classList.remove('open');
/* 팝업 바깥(옆쪽) 클릭으로는 닫히지 않습니다 — ✕ 버튼으로만 닫힙니다 */
$('#tBtnCamp').onclick=()=>{ setType('camping'); if(pickMarker) pickMarker.setIcon(pinIcon('camping')); };
$('#tBtnFish').onclick=()=>{ setType('fishing'); if(pickMarker) pickMarker.setIcon(pinIcon('fishing')); };
$$('#fStars span').forEach(s=>s.onclick=()=>setStars(+s.dataset.v));
bindQchips('#fWeather','weather'); bindQchips('#fCampType','campType'); bindQchips('#fRevisit','revisit'); bindQchips('#fTide','tide');

/* ============================================================ init */
loadData();
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) loadData(); });
window.addEventListener('online', loadData);
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
